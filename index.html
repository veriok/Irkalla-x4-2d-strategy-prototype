<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Irkallia</title>
  <link rel="stylesheet" href="style/main.css" />
  <link rel="stylesheet" href="style/map.css" />
  <link rel="stylesheet" href="style/animations.css" />
  <link rel="stylesheet" href="style/province-modal.css" />
  <link rel="stylesheet" href="style/research-modal.css" />
  <link rel="stylesheet" href="style/hero-panel.css" />
  <link rel="stylesheet" href="style/diplomacy-modal.css" />

  <!-- ES module import map: d3-delaunay from CDN -->
  <script type="importmap">
  {
    "imports": {
      "d3-delaunay": "https://esm.sh/d3-delaunay@6"
    }
  }
  </script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       TOP BAR  — resource display + turn info
  ═══════════════════════════════════════════════════ -->
  <header id="top-bar">
    <div id="faction-banner">
      <img id="faction-flag" alt="Faction flag" hidden />
      <span id="faction-emoji"></span>
      <span id="faction-name"></span>
    </div>
    <div id="resource-bar"><!-- filled by resource-bar.js --></div>
    <div id="turn-display">
      Turn <span id="turn-number">1</span>
    </div>
    <div id="heroes-top-area"></div>
    <button id="minimap-btn" class="btn-secondary">🗺 Map</button>
    <button id="province-list-btn" class="btn-secondary">☰ Provinces</button>
    <button id="research-btn" class="btn-secondary">📚 Research</button>
    <button id="diplomacy-btn" class="btn-secondary">🏛 Diplomacy</button>
    <button id="settings-btn" class="btn-secondary">⚙ Settings</button>
    <button id="end-turn-btn" class="btn-primary">End Turn ⏭</button>
  </header>

  <!-- ═══════════════════════════════════════════════════
       MAIN AREA  — army panel | map | province panel
  ═══════════════════════════════════════════════════ -->
  <main id="game-area">

    <!-- LEFT: army panel -->
    <aside id="army-panel" class="side-panel">
      <h2>⚔ Armies</h2>
      <div id="army-list"><!-- filled by army-panel.js --></div>
    </aside>

    <!-- CENTER: map -->
    <section id="map-section">
      <svg id="map" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid meet"
           xmlns="http://www.w3.org/2000/svg">

        <!-- Biome/terrain texture defs -->
        <defs>
          <!-- Fog of war hatch pattern -->
          <pattern id="fog-pattern" patternUnits="userSpaceOnUse" width="8" height="8">
            <rect width="8" height="8" fill="#111" opacity="0.9"/>
            <line x1="0" y1="0" x2="8" y2="8" stroke="#000" stroke-width="0.8"/>
          </pattern>
          <!-- Explored (greyed) overlay -->
          <pattern id="explored-pattern" patternUnits="userSpaceOnUse" width="8" height="8">
            <rect width="8" height="8" fill="#333" opacity="0.55"/>
          </pattern>
        </defs>

        <!-- Layer 0: Biome terrain base (static, no interaction) -->
        <g id="terrain-layer"></g>

        <!-- Layer 1: Province ownership overlay (semi-transparent faction tint) -->
        <g id="provinces"></g>

        <!-- Layer 1b: Ocean inner-line decoration (pointer-events:none, no data-province) -->
        <g id="ocean-deco-layer"></g>

        <!-- Layer 1c: Capital settlement icons -->
        <g id="settlement-layer"></g>

        <!-- Layer 2: National borders (faction-colored outward edges) -->
        <g id="borders"></g>

        <!-- Layer 3: Fog of war (duplicate paths, toggled by class) -->
        <g id="fog-layer"></g>

        <!-- Layer 4: Unit/army icons -->
        <g id="unit-layer"></g>

        <!-- Layer 5: Province name labels -->
        <g id="label-layer"></g>

      </svg>
    </section>

    <!-- RIGHT: province panel -->
    <aside id="province-panel" class="side-panel">
      <!-- Minimap — always at top, shown/hidden by button in header -->
      <div id="minimap-wrap" hidden><canvas id="minimap-canvas"></canvas></div>
      <!-- Province list view (replaces panel content when active) -->
      <div id="province-list-view" hidden></div>
      <div id="province-panel-empty">
        <p>Click a province to inspect it.</p>
      </div>
      <div id="province-panel-content" hidden>
        <div id="province-header">
          <div id="province-name-row">
            <span id="province-biome-icon"></span>
            <h2 id="province-name"></h2>
          </div>
          <span id="province-owner-badge"></span>
          <div id="province-core-info"></div>
        </div>
        <p id="province-biome-label"></p>
        <div id="province-governor-area" hidden></div>

        <div id="province-resource-summary" hidden></div>
        <div id="province-core-row" hidden></div>

        <div id="province-militia-info" hidden>
          <h3>⚔ Militia</h3>
          <div class="militia-row">
            <span class="militia-count"></span>
            <span class="militia-status"></span>
          </div>
          <div class="militia-bar"><div class="militia-fill"></div></div>
        </div>

        <h3>Locations</h3>
        <div id="location-list"><!-- filled by province-panel.js --></div>

        <div id="recruit-section" hidden>
          <h3>⚔ Recruit Units</h3>
          <div id="recruit-list" class="card-grid"></div>
        </div>

        <div id="province-status-effects" hidden></div>

        <div id="production-queue-section" hidden>
          <h3>⚙ Production Queue</h3>
          <div id="production-queue-list" class="card-grid--5"></div>
        </div>
      </div>
    </aside>

  </main>

  <!-- ═══════════════════════════════════════════════════
       BOTTOM: event log
  ═══════════════════════════════════════════════════ -->
  <footer id="log-bar">
    <div id="event-log"><!-- filled by event-log.js --></div>
  </footer>

  <!-- Building tooltip (shown on hover) -->
  <div id="building-tooltip" class="building-tooltip" hidden></div>
  <div id="unit-tooltip" class="unit-tooltip" hidden></div>
  <div id="tech-tooltip" class="building-tooltip" hidden></div>

  <!-- ═══════════════════════════════════════════════════
       MODAL (game-over, confirm)
  ═══════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div id="modal-box" class="modal-box">
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
      <div id="modal-buttons"></div>
    </div>
  </div>

  <!-- Province hover tooltip -->
  <div id="province-tooltip" hidden>
    <div class="tooltip-name"></div>
    <div class="tooltip-desc"></div>
    <div class="tooltip-militia"></div>
    <div class="militia-bar-wrap"><div class="militia-bar-fill"></div></div>
    <div class="tooltip-combat-info" hidden>
      <div class="tooltip-win-chance"></div>
      <div class="tooltip-def-bonus"></div>
      <div class="tooltip-casualties"></div>
    </div>
  </div>

  <!-- Research Modal -->
  <div id="research-modal-overlay" hidden>
    <div id="research-modal">
      <div id="rmod-header">
        <h2 id="rmod-title">Research</h2>
        <div id="rmod-research-pool"><!-- balance + income injected by JS --></div>
        <button id="rmod-close" class="btn-secondary">✕ Close</button>
      </div>
      <div id="rmod-era-tabs">
        <button class="rmod-era-tab active" data-era="stone">🔘 Stone Age</button>
        <button class="rmod-era-tab" data-era="bronze">🟠 Bronze Age</button>
        <button class="rmod-era-tab" data-era="iron">⚫ Iron Age</button>
        <button class="rmod-era-tab" data-era="silver">⚪ Silver Age</button>
        <button class="rmod-era-tab" data-era="gold">🟡 Gold Age</button>
        <button class="rmod-era-tab" data-era="mithril">💠 Mithril Age</button>
        <button class="rmod-era-tab rmod-magic-tab" data-era="magic">✨ Magic</button>
      </div>
      <div id="rmod-body">
        <div id="rmod-tree-scroll">
          <div id="rmod-tree-grid"><!-- era columns injected by JS --></div>
        </div>
        <div id="rmod-magic-panel" hidden><!-- filled by research-modal.js when magic tab is active --></div>
      </div>
    </div>
  </div>

  <!-- Diplomacy Modal -->
  <div id="diplomacy-modal-overlay" hidden>
    <div id="diplomacy-modal">
      <div id="dmod-header">
        <span id="dmod-title-text">Diplomacy</span>
        <button id="dmod-close">✕ Close</button>
      </div>
      <div id="dmod-flags-row"><!-- faction flag slots injected by JS --></div>
      <div id="dmod-body">
        <img id="dmod-leader-img" src="" alt="" />
        <div id="dmod-flavor-text"></div>
        <div id="dmod-lower">
          <div id="dmod-leader-area">
            <div id="dmod-leader-name"></div>
            <div id="dmod-faction-name"></div>
            <div id="dmod-dipstate-badge"></div>
            <div id="dmod-opinion-wrap">
              <div id="dmod-opinion-bar-bg">
                <div id="dmod-opinion-bar-fill"></div>
              </div>
              <div id="dmod-opinion-label"></div>
              <div id="dmod-memory-tooltip" hidden></div>
            </div>
          </div>
          <div id="dmod-actions-area">
            <div id="dmod-pending-proposal" hidden>
              <div class="dmod-proposal-text" id="dmod-pending-text"></div>
              <div class="dmod-proposal-btns" id="dmod-proposal-btns"></div>
            </div>
            <div id="dmod-actions-list"></div>
            <div id="dmod-gift-row" hidden></div>
            <div id="dmod-empty-state" hidden>Select a faction to open diplomacy.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Province Management Modal -->
  <div id="province-modal-overlay" hidden>
    <div id="province-modal">
      <div id="pmod-header">
        <div id="pmod-faction-flag">
          <img id="pmod-flag-img" alt="" hidden />
          <span id="pmod-flag-emoji"></span>
        </div>
        <div id="pmod-governor-area"></div>
        <div id="pmod-title-area">
          <div id="pmod-nav-row">
            <span id="pmod-nav-prev" class="pmod-nav-arrow">‹</span>
            <h2 id="pmod-province-name"></h2>
            <span id="pmod-nav-next" class="pmod-nav-arrow">›</span>
          </div>
          <div id="pmod-province-sub"></div>
          <div id="pmod-income-chips"></div>
          <div id="pmod-stats-row"></div>
        </div>
        <div id="pmod-effects">
          <span class="pmod-effect-icon" title="No active effects" style="opacity:0.3">✨</span>
        </div>
        <button id="pmod-close" class="btn-secondary">✕ Close</button>
      </div>
      <div id="pmod-body">
        <div id="pmod-locations">
          <div id="pmod-loc-cards"><!-- location rows --></div>
          <div id="pmod-building-slots" hidden><!-- unused --></div>
        </div>
        <div id="pmod-sidebar">
          <div id="pmod-sidebar-title">Actions</div>
          <div id="pmod-sidebar-actions"><!-- dynamic actions --></div>
        </div>
      </div>
      <div id="pmod-queue-row">
        <span class="pmod-queue-label">Production</span>
        <div class="pmod-queue-slots" id="pmod-queue-slots"><!-- 6 queue slots --></div>
      </div>
    </div>
  </div>

  <!-- Spellbook Modal -->
  <div id="spellbook-modal-overlay" hidden>
    <div id="spellbook-modal">
      <div id="sb-header">
        <span id="sb-hero-name">📖 Spellbook</span>
        <span id="sb-mana"></span>
        <button id="sb-close" class="btn-secondary">✕ Close</button>
      </div>
      <div id="sb-book">
        <!-- Left page: combat spells -->
        <div class="sb-page sb-page--left" id="sb-left-page"></div>
        <!-- Spine -->
        <div class="sb-spine"></div>
        <!-- Right page: province spells -->
        <div class="sb-page sb-page--right" id="sb-right-page"></div>
      </div>
      <div id="sb-footer">
        <div id="sb-book-nav"></div>
      </div>
    </div>
  </div>

  <!-- Hero Panel Overlay -->
  <div id="hero-panel-overlay" hidden>
    <div id="hero-panel">
      <div id="hpanel-header">
        <h2 id="hpanel-title">🦸 Heroes</h2>
        <button id="hpanel-close" class="btn-secondary">✕ Close</button>
      </div>
      <div id="hpanel-body">
        <!-- Left sidebar: hero list + recruit -->
        <div id="hpanel-sidebar">
          <div id="hpanel-hero-list"><!-- filled by hero-panel.js --></div>
          <div id="hpanel-recruit-section"><!-- filled by hero-panel.js --></div>
        </div>
        <!-- Main area: hero detail -->
        <div id="hpanel-detail"><!-- filled by hero-panel.js --></div>
      </div>
    </div>
  </div>

  <!-- Hero Assignment Modal (small overlay, shared by army panel + province modal) -->
  <div id="hero-assign-modal-overlay" hidden>
    <div id="ham-box"><!-- filled by hero-assign-modal.js --></div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal-overlay" class="modal-overlay" hidden>
    <div id="settings-modal" class="modal-box settings-modal">
      <h2>Settings</h2>
      <div class="settings-section">
        <div class="settings-label">Font Size</div>
        <div class="settings-font-btns">
          <button class="settings-font-btn btn-secondary" data-size="14">Normal</button>
          <button class="settings-font-btn btn-secondary" data-size="16">Large</button>
          <button class="settings-font-btn btn-secondary" data-size="18">Extra Large</button>
        </div>
      </div>
      <button id="settings-close" class="btn-secondary" style="margin-top:16px">Close</button>
    </div>
  </div>

  <!-- Entry point -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
